<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>가계부</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
:root{
  --bg0:#0f1a14;
  --bg1:#162019;
  --bg2:#1e2d21;
  --bg3:#263529;
  --bg4:#2e3e31;
  --border:#3a4f3d;
  --border2:#4a6350;
  --text1:#d6ead9;
  --text2:#92b096;
  --text3:#5e7a62;
  --green:#4caf7d;
  --green2:#3a9469;
  --red:#e06c6c;
  --red2:#c45555;
  --blue:#5b9bd5;
  --amber:#c8963e;
  --radius:8px;
  --radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:var(--bg0);color:var(--text1);font-size:15px;min-height:100vh}
input,select,button,textarea{font-family:inherit;color:var(--text1)}
input,select{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:14px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--green)}
input::placeholder{color:var(--text3)}
.app{max-width:1060px;margin:0 auto;padding:1.2rem 1rem}

/* ── 로그인 ── */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:18px}
.login-screen h2{font-size:22px;font-weight:500;color:var(--green)}
.login-screen p{font-size:14px;color:var(--text2);text-align:center;max-width:300px;line-height:1.7}
.google-btn{display:flex;align-items:center;gap:10px;padding:11px 22px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);cursor:pointer;font-size:14px;color:var(--text1);transition:background .15s}
.google-btn:hover{background:var(--bg3)}
.google-btn svg{width:18px;height:18px;flex-shrink:0}

/* ── 상단 바 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:0.5px solid var(--border)}
.app-title{font-size:17px;font-weight:500;color:var(--green);letter-spacing:.02em}
.user-info{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.user-info img{width:24px;height:24px;border-radius:50%;border:1px solid var(--border2)}
.logout-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text2)}
.logout-btn:hover{border-color:var(--border2);color:var(--text1)}
.sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 가계부 탭 ── */
.book-bar{display:flex;align-items:center;gap:5px;margin-bottom:1rem;flex-wrap:wrap}
.book-tab{padding:6px 14px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;max-width:160px;transition:all .15s}
.book-tab.active{background:var(--bg3);color:var(--text1);border-color:var(--green);font-weight:500}
.book-tab:hover:not(.active){background:var(--bg2);color:var(--text1)}
.book-tab-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.book-tab .rename-btn{font-size:11px;color:var(--text3);padding:0 1px;background:none;border:none;cursor:pointer}
.book-tab .rename-btn:hover{color:var(--text1)}
.add-book-btn{padding:6px 10px;border:0.5px dashed var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:18px;color:var(--text3);line-height:1}
.add-book-btn:hover{color:var(--green);border-color:var(--green)}

/* ── 뷰 탭 ── */
.view-bar{display:flex;gap:5px;margin-bottom:1.1rem}
.vtab{padding:6px 16px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.vtab.active{background:var(--bg3);color:var(--green);border-color:var(--green);font-weight:500}
.vtab:hover:not(.active){background:var(--bg2);color:var(--text1)}

/* ── 요약 ── */
.summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.1rem}
.scard{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px}
.scard-label{font-size:12px;color:var(--text2);margin-bottom:5px}
.scard-value{font-size:18px;font-weight:500}
.inc-c{color:var(--green)}.exp-c{color:var(--red)}

/* ── 섹션 타이틀 ── */
.section-title{font-size:12px;font-weight:500;color:var(--text2);margin:.9rem 0 6px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between}

/* ── 폼 ── */
.form-grid{display:grid;grid-template-columns:128px 1fr 1fr 1fr 115px;gap:6px;margin-bottom:6px}
.add-row{display:flex;gap:7px;margin-bottom:.9rem}
.type-toggle{display:flex;gap:3px}
.type-btn{padding:6px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text2);white-space:nowrap;transition:all .15s}
.type-btn.active.exp-type{background:rgba(224,108,108,.15);border-color:var(--red);color:var(--red)}
.type-btn.active.inc-type{background:rgba(76,175,125,.15);border-color:var(--green);color:var(--green)}
.type-btn:not(.active):hover{background:var(--bg3);color:var(--text1)}
.add-btn{flex:1;padding:7px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;color:var(--text1);font-size:13px;transition:all .15s}
.add-btn:hover{background:var(--bg3);border-color:var(--border2)}

/* ── 아이콘 버튼 ── */
.icon-btn{padding:5px 9px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:15px;color:var(--text2);line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:not(:disabled):hover{background:var(--bg3);color:var(--text1);border-color:var(--border2)}
.icon-btn:disabled{opacity:.3;cursor:default}

/* ── 테이블 ── */
.tx-wrap{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.tx-table{width:100%;border-collapse:collapse;background:var(--bg1);table-layout:fixed}
.tx-table th{font-size:12px;font-weight:500;color:var(--text2);padding:0;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.th-inner{display:flex;align-items:center;gap:3px;padding:7px 9px;cursor:pointer;user-select:none;white-space:nowrap}
.th-inner:hover{color:var(--text1)}
.th-drag{cursor:grab;color:var(--text3);font-size:11px;margin-right:2px}
.sort-arrow{font-size:10px;color:var(--green)}
.th-dragging{opacity:.4}
.th-drag-over{border-left:2px solid var(--green)}
.filter-row td{padding:3px 4px;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.filter-row input,.filter-row select{padding:4px 7px;font-size:12px;background:var(--bg1)}
.tx-table td{padding:0;border-bottom:0.5px solid var(--border);font-size:14px;vertical-align:middle;overflow:hidden}
.tx-table tbody tr:last-child td{border-bottom:none}
.tx-table tbody tr:hover td{background:var(--bg2)}
.tx-table tbody tr[draggable]{cursor:grab}
.tx-table tbody tr.row-drag-over td{border-top:2px solid var(--green)}
.cell-inner{padding:7px 9px;min-height:34px;display:flex;align-items:center;cursor:pointer;word-break:break-all;color:var(--text1)}
.cell-inner:hover{background:var(--bg3)}
.cell-edit input,.cell-edit select{border:none;border-bottom:1.5px solid var(--green);background:var(--bg3);padding:7px 9px;font-size:14px;width:100%;border-radius:0}
.col-date{width:106px}.col-title{width:16%}.col-desc{width:auto}.col-cat{width:90px}.col-amount{width:114px}.col-del{width:32px;text-align:center}
.amount-disp{font-weight:500;justify-content:flex-end}
.amount-disp.inc{color:var(--green)}.amount-disp.exp{color:var(--red)}
.del-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:5px;width:100%;transition:color .15s}
.del-btn:hover{color:var(--red)}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:14px}

/* ── 캘린더 ── */
.cal-controls{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.cal-controls select{width:auto;background:var(--bg2)}
.month-nav{display:flex;align-items:center;gap:7px}
.month-nav button{background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 10px;cursor:pointer;color:var(--text1);font-size:13px}
.month-nav button:hover{background:var(--bg3)}
.month-label{font-size:15px;font-weight:500;min-width:88px;text-align:center;color:var(--text1)}
.cal{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg1)}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--border);background:var(--bg2)}
.cal-dow{text-align:center;padding:7px 4px;font-size:12px;color:var(--text2);font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:90px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:5px;transition:background .1s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--bg2)}
.cal-day{font-size:12px;color:var(--text2);margin-bottom:3px;user-select:none}
.cal-day.today{background:var(--green);color:#0f1a14;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:600}
.cal-day.sun{color:var(--red)}.cal-day.sat{color:var(--blue)}
.cal-item{font-size:11px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .1s}
.cal-item:hover{opacity:.75}
.cal-item.exp{background:rgba(224,108,108,.18);color:#f4a0a0}
.cal-item.inc{background:rgba(76,175,125,.18);color:#7fd4a8}
.cal-item.dragging-cal{opacity:.3}
.cal-cell.cal-drag-over{background:rgba(76,175,125,.1)}
.cal-empty{min-height:90px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);background:var(--bg0)}
.cal-empty:nth-child(7n){border-right:none}

/* ── 반복지출 ── */
.recur-list{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
.recur-item{display:grid;grid-template-columns:1fr 80px 90px 90px 32px;align-items:center;padding:8px 12px;gap:8px;border-bottom:0.5px solid var(--border);font-size:13px;background:var(--bg1)}
.recur-item:last-child{border-bottom:none}

/* ── 카테고리 ── */
.cat-mgr{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.cat-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cat-tag{display:flex;align-items:center;gap:4px;padding:3px 10px;border:0.5px solid var(--border);border-radius:99px;font-size:13px;background:var(--bg2);color:var(--text2)}
.cat-del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:0 2px}
.cat-del-btn:hover{color:var(--red)}
.row-input{display:flex;gap:7px}
.row-input input{flex:1}
.row-input button,.csv-btn{padding:6px 13px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text1);transition:all .15s}
.row-input button:hover,.csv-btn:hover{background:var(--bg3);border-color:var(--border2)}

/* ── 팝업 ── */
.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:900}
.popup{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:20px 22px;width:340px;max-width:96vw;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.popup h3{font-size:15px;font-weight:500;margin-bottom:14px;color:var(--text1)}
.pf{margin-bottom:9px}
.pf label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px}
.pf input,.pf select{background:var(--bg3)}
.popup-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:16px}
.popup-btns button{padding:6px 14px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;background:none;color:var(--text1);transition:all .15s}
.popup-btns button:hover{background:var(--bg3);border-color:var(--border2)}
.popup-btns .primary{border-color:var(--green);color:var(--green)}
.popup-btns .primary:hover{background:rgba(76,175,125,.12)}
.popup-btns .danger{border-color:var(--red);color:var(--red)}
.popup-btns .danger:hover{background:rgba(224,108,108,.12)}
</style>
</head>
<body>
<div class="app">

<div id="loginScreen" class="login-screen">
  <h2>가계부</h2>
  <p>Google 계정으로 로그인하면 모든 기기에서 데이터가 자동으로 동기화됩니다.</p>
  <button class="google-btn" onclick="signIn()">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Google로 로그인
  </button>
</div>

<div id="mainApp" style="display:none">
  <div class="top-bar">
    <div class="app-title">가계부</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">대기 중</span></div>
      <div class="user-info"><img id="userAvatar" src="" alt=""><span id="userName"></span></div>
      <button class="logout-btn" onclick="signOut()">로그아웃</button>
    </div>
  </div>

  <div class="book-bar" id="bookBar"></div>

  <div class="view-bar">
    <button class="vtab active" onclick="switchView('list',this)">전체 내역</button>
    <button class="vtab" onclick="switchView('calendar',this)">캘린더</button>
    <button class="vtab" onclick="switchView('recur',this)">반복지출</button>
    <button class="vtab" onclick="switchView('settings',this)">설정</button>
  </div>

  <div class="summary">
    <div class="scard"><div class="scard-label">수입 합계</div><div class="scard-value inc-c" id="sumIncome">0원</div></div>
    <div class="scard"><div class="scard-label">지출 합계</div><div class="scard-value exp-c" id="sumExpense">0원</div></div>
    <div class="scard"><div class="scard-label">잔액</div><div class="scard-value" id="sumBalance">0원</div></div>
  </div>

  <div id="addForm">
    <div class="section-title">
      <span>내역 추가</span>
      <div style="display:flex;gap:5px">
        <button class="icon-btn" id="undoBtn" onclick="undo()" disabled title="Ctrl+Z">↩</button>
        <button class="icon-btn" id="redoBtn" onclick="redo()" disabled title="Ctrl+Y">↪</button>
        <button class="icon-btn" onclick="exportCSV()" title="CSV 내보내기">⬇</button>
      </div>
    </div>
    <div class="form-grid">
      <input type="date" id="fDate" onkeydown="fKey(event)">
      <input type="text" id="fTitle" placeholder="제목" onkeydown="fKey(event)">
      <input type="text" id="fDesc" placeholder="내용" onkeydown="fKey(event)">
      <select id="fCat" onkeydown="fKey(event)"></select>
      <input type="text" id="fAmount" placeholder="금액" onkeydown="fKey(event)">
    </div>
    <div class="add-row">
      <button class="add-btn" onclick="addTx()">+ 추가 · Enter</button>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:.8rem">기본은 지출로 처리됩니다. 금액 앞에 + 를 붙이면 수입으로 처리됩니다. 예: +300000</p>
  </div>

  <div id="viewList">
    <div class="tx-wrap">
      <table class="tx-table">
        <thead>
          <tr id="headerRow"></tr>
          <tr class="filter-row" id="filterRow"></tr>
        </thead>
        <tbody id="txBody"></tbody>
      </table>
    </div>
  </div>

  <div id="viewCalendar" style="display:none">
    <div class="cal-controls">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <div class="month-label" id="calMonthLabel"></div>
        <button onclick="changeMonth(1)">&#8594;</button>
      </div>
      <select id="calSort" onchange="renderCalendar()" style="width:auto;background:var(--bg2)">
        <option value="order">순서</option>
        <option value="asc">금액 낮은순</option>
        <option value="desc">금액 높은순</option>
      </select>
    </div>
    <div class="cal" id="calEl"></div>
  </div>

  <div id="viewRecur" style="display:none">
    <div class="section-title">반복 내역</div>
    <div id="recurListEl" class="recur-list" style="display:none"></div>
    <div class="section-title" style="margin-top:.5rem">반복 내역 추가</div>
    <div class="form-grid" style="margin-bottom:6px">
      <select id="rFreq"><option value="weekly">매주</option><option value="monthly" selected>매월</option><option value="yearly">매년</option></select>
      <input type="text" id="rTitle" placeholder="제목">
      <input type="text" id="rDesc" placeholder="내용">
      <select id="rCat"></select>
      <input type="text" id="rAmount" placeholder="금액">
    </div>
    <div class="add-row">
      <div style="flex:1;display:flex;gap:7px">
        <input style="flex:1" type="date" id="rStart">
        <button class="add-btn" style="flex:none;padding:7px 18px" onclick="addRecur()">+ 추가</button>
      </div>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:.5rem">기본은 지출입니다. 금액 앞에 + 를 붙이면 수입으로 처리됩니다.</p>
  </div>

  <div id="viewSettings" style="display:none">
    <div class="section-title">카테고리 관리</div>
    <div class="cat-mgr">
      <div class="cat-list" id="catListEl"></div>
      <div class="row-input">
        <input type="text" id="newCatInput" placeholder="새 카테고리" onkeydown="if(event.key==='Enter')addCat()">
        <button onclick="addCat()">추가</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- 팝업: 캘린더 -->
<div class="popup-bg" id="calPopup" style="display:none" onclick="if(event.target===this)closeCalPopup()">
  <div class="popup">
    <h3 id="cpTitle_h">내역 수정</h3>
    <div class="pf"><label>날짜</label><input type="date" id="cpDate"></div>
    <div class="pf"><label>제목</label><input type="text" id="cpTitle"></div>
    <div class="pf"><label>내용</label><input type="text" id="cpDesc"></div>
    <div class="pf"><label>카테고리</label><select id="cpCat"></select></div>
    <div class="pf"><label>금액</label><input type="number" id="cpAmount" min="1"></div>
    <div class="pf"><label>유형</label><select id="cpType"><option value="expense">지출</option><option value="income">수입</option></select></div>
    <div class="popup-btns">
      <button id="cpDelBtn" class="danger" style="display:none" onclick="deleteCalPopupItem()">삭제</button>
      <button onclick="closeCalPopup()">취소</button>
      <button class="primary" onclick="saveCalPopup()">저장</button>
    </div>
  </div>
</div>

<!-- 팝업: 가계부 이름 -->
<div class="popup-bg" id="bookPopup" style="display:none" onclick="if(event.target===this)closeBookPopup()">
  <div class="popup">
    <h3>가계부 이름 변경</h3>
    <div class="pf"><label>이름</label><input type="text" id="bookNameInput" onkeydown="if(event.key==='Enter')saveBookName()"></div>
    <div class="popup-btns">
      <button class="danger" onclick="deleteBook()">삭제</button>
      <button onclick="closeBookPopup()">취소</button>
      <button class="primary" onclick="saveBookName()">저장</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID='275873536120-1r9pr1rt9j4tn55fpaf8jn2oecm2u2cq.apps.googleusercontent.com';
const SHEET_ID='1KWlOOsfcLr2geDY3BMz7XQdG2TdsS7exFCO_VrfuFMg';
const SCOPES='https://www.googleapis.com/auth/spreadsheets';
const API_BASE='https://sheets.googleapis.com/v4/spreadsheets';

const DEFAULT_CATS=['식비','교통','주거','의료','쇼핑','여가','급여','부수입','기타'];
let accessToken=null,curView='list',curYear,curMonth;
let undoStack=[],redoStack=[];
let editingCell={id:null,field:null};
let calPopupId=null,calPopupDate=null,bookPopupId=null;
let txType='expense',rType='expense';
let txCache={};

const ALL_COLS=[
  {key:'title',label:'제목',w:'16%'},
  {key:'amount',label:'금액',w:'114px'},
  {key:'date',label:'날짜',w:'106px'},
  {key:'cat',label:'카테고리',w:'90px'},
  {key:'desc',label:'내용',w:'auto'},
  {key:'_del',label:'',w:'32px'},
];
let colOrder=['title','amount','date','cat','desc','_del'];
let sortKey='date',sortDir='desc';
let filters={date:'',title:'',desc:'',cat:'',amount:''};
let dragColFrom=null,rowDragFromId=null,dragCalId=null;

/* ── BOOKS ── */
function getBooks(){try{return JSON.parse(localStorage.getItem('budget_books')||'null')||[{id:'메인계좌',name:'메인계좌'},{id:'영광사랑카드',name:'영광사랑카드'},{id:'혜강쿠팡',name:'혜강쿠팡'}];}catch(e){return [{id:'메인계좌',name:'메인계좌'}];}}
function saveBooks(b){localStorage.setItem('budget_books',JSON.stringify(b));}
function curBook(){return localStorage.getItem('budget_cur_book')||getBooks()[0].id;}
function setCurBook(id){localStorage.setItem('budget_cur_book',id);}

/* ── AUTH ── */
let tokenClient;
function initGSI(){
  if(typeof google==='undefined'||!google.accounts){setTimeout(initGSI,100);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){setSyncStatus('err','로그인 실패');return;}
      accessToken=resp.access_token;
      localStorage.setItem('gtoken',accessToken);
      showApp();
    }
  });
  const saved=localStorage.getItem('gtoken');
  if(saved){accessToken=saved;showApp();}
}
function signIn(){if(!tokenClient){alert('잠시 후 다시 시도해주세요.');return;}tokenClient.requestAccessToken({prompt:''});}
function signOut(){accessToken=null;localStorage.removeItem('gtoken');document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';}
async function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  initDate();document.getElementById('fDate').value=todayStr();
  await ensureSheetsExist();await loadFromSheet();render();
}
window.addEventListener('load',initGSI);

/* ── SHEETS API ── */
function setSyncStatus(state,msg){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');
  dot.className='sync-dot'+(state?' '+state:'');lbl.textContent=msg;
}
async function apiReq(method,url,body){
  setSyncStatus('syncing','동기화 중...');
  try{
    const res=await fetch(url,{method,headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
    if(res.status===401){setSyncStatus('err','인증 만료');tokenClient.requestAccessToken({prompt:''});return null;}
    const data=await res.json();setSyncStatus('ok','동기화 완료');return data;
  }catch(e){setSyncStatus('err','동기화 실패');return null;}
}
async function getSheetNames(){const d=await apiReq('GET',`${API_BASE}/${SHEET_ID}?fields=sheets.properties.title`);return d?.sheets?.map(s=>s.properties.title)||[];}
async function ensureSheetsExist(){
  const existing=await getSheetNames();const books=getBooks();
  const toCreate=books.filter(b=>!existing.includes(b.id));if(!toCreate.length)return;
  await apiReq('POST',`${API_BASE}/${SHEET_ID}:batchUpdate`,{requests:toCreate.map(b=>({addSheet:{properties:{title:b.id}}}))});
  for(const b of toCreate)await apiReq('PUT',`${API_BASE}/${SHEET_ID}/values/${enc(b.id+'!A1:H1')}?valueInputOption=RAW`,{values:[['ID','날짜','제목','내용','카테고리','금액','유형','순서']]});
}
function enc(s){return encodeURIComponent(s);}
async function loadFromSheet(){
  const sheet=curBook();setSyncStatus('syncing','불러오는 중...');
  const d=await apiReq('GET',`${API_BASE}/${SHEET_ID}/values/${enc(sheet+'!A:H')}`);
  const rows=d?.values||[];
  txCache[sheet]=rows.length<=1?[]:rows.slice(1).filter(r=>r[0]).map(r=>({id:r[0],date:r[1]||'',title:r[2]||'',desc:r[3]||'',cat:r[4]||'',amount:parseInt(r[5])||0,type:r[6]==='수입'?'income':'expense',order:parseInt(r[7])||0}));
}
async function saveToSheet(){
  const sheet=curBook(),txs=txCache[sheet]||[];
  const rows=[['ID','날짜','제목','내용','카테고리','금액','유형','순서'],...txs.map(t=>[t.id,t.date,t.title||'',t.desc||'',t.cat||'',t.amount,t.type==='income'?'수입':'지출',t.order||0])];
  await apiReq('PUT',`${API_BASE}/${SHEET_ID}/values/${enc(sheet+'!A1')}?valueInputOption=RAW`,{values:rows});
}

/* ── TX CACHE / UNDO ── */
function loadTxs(){return txCache[curBook()]||[];}
function saveTxs(arr){
  const sheet=curBook();
  undoStack.push(JSON.stringify(txCache[sheet]||[]));
  if(undoStack.length>50)undoStack.shift();
  redoStack=[];txCache[sheet]=arr;updateHistBtns();saveToSheet();
}
function undo(){if(!undoStack.length)return;const s=curBook();redoStack.push(JSON.stringify(txCache[s]||[]));txCache[s]=JSON.parse(undoStack.pop());updateHistBtns();saveToSheet();render();}
function redo(){if(!redoStack.length)return;const s=curBook();undoStack.push(JSON.stringify(txCache[s]||[]));txCache[s]=JSON.parse(redoStack.pop());updateHistBtns();saveToSheet();render();}
function updateHistBtns(){document.getElementById('undoBtn').disabled=!undoStack.length;document.getElementById('redoBtn').disabled=!redoStack.length;}
function loadCats(){try{const s=localStorage.getItem('budget_cats_v1');return s?JSON.parse(s):[...DEFAULT_CATS];}catch(e){return [...DEFAULT_CATS];}}
function saveCats(c){localStorage.setItem('budget_cats_v1',JSON.stringify(c));}

/* ── BOOK BAR ── */
function renderBookBar(){
  const books=getBooks(),cur=curBook();
  document.getElementById('bookBar').innerHTML=books.map(b=>`
    <button class="book-tab${b.id===cur?' active':''}" onclick="switchBook('${b.id}')">
      <span class="book-tab-name">${b.name}</span>
      <button class="rename-btn" onclick="event.stopPropagation();openBookPopup('${b.id}')">✎</button>
    </button>`).join('')+`<button class="add-book-btn" onclick="addBook()">+</button>`;
}
async function switchBook(id){setCurBook(id);undoStack=[];redoStack=[];updateHistBtns();if(!txCache[id])await loadFromSheet();render();}
async function addBook(){const id='book_'+Date.now();const books=getBooks();books.push({id,name:'새 가계부'});saveBooks(books);setCurBook(id);await ensureSheetsExist();await loadFromSheet();render();openBookPopup(id);}
function openBookPopup(id){bookPopupId=id;document.getElementById('bookNameInput').value=getBooks().find(b=>b.id===id)?.name||'';document.getElementById('bookPopup').style.display='flex';setTimeout(()=>document.getElementById('bookNameInput').focus(),50);}
function closeBookPopup(){document.getElementById('bookPopup').style.display='none';bookPopupId=null;}
function saveBookName(){const name=document.getElementById('bookNameInput').value.trim();if(!name)return;const books=getBooks();const i=books.findIndex(b=>b.id===bookPopupId);if(i>=0){books[i].name=name;saveBooks(books);}closeBookPopup();renderBookBar();}
function deleteBook(){const books=getBooks();if(books.length<=1){alert('마지막 가계부는 삭제할 수 없습니다.');return;}const nb=books.filter(b=>b.id!==bookPopupId);saveBooks(nb);if(curBook()===bookPopupId)setCurBook(nb[0].id);closeBookPopup();render();}

/* ── VIEW / DATE / TYPE ── */
function switchView(name,el){
  curView=name;
  ['list','calendar','recur','settings'].forEach(v=>document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).style.display=v===name?'block':'none');
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));el.classList.add('active');
  document.getElementById('addForm').style.display=name==='settings'||name==='recur'?'none':'block';render();
}
function initDate(){const d=new Date();curYear=d.getFullYear();curMonth=d.getMonth();}
function changeMonth(d){curMonth+=d;if(curMonth<0){curMonth=11;curYear--;}if(curMonth>11){curMonth=0;curYear++;}renderCalendar();}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function setType(t){txType=t;document.getElementById('btnExp').classList.toggle('active',t==='expense');document.getElementById('btnInc').classList.toggle('active',t==='income');}
function setRType(t){rType=t;document.getElementById('rBtnExp').classList.toggle('active',t==='expense');document.getElementById('rBtnInc').classList.toggle('active',t==='income');}

/* ── ADD TX ── */
function fKey(e){if(e.key==='Enter'){e.preventDefault();addTx();}}
function addTx(){
  const date=document.getElementById('fDate').value,title=document.getElementById('fTitle').value.trim();
  const desc=document.getElementById('fDesc').value.trim(),cat=document.getElementById('fCat').value;
  const raw=document.getElementById('fAmount').value.trim();
  if(!date||!title||!raw)return;
  const isIncome=raw.startsWith('+');
  const amount=parseInt(raw.replace(/[^0-9]/g,''));if(!amount)return;
  const txs=loadTxs();
  const mo=txs.filter(t=>t.date===date).reduce((m,t)=>Math.max(m,t.order||0),0);
  txs.push({id:'tx_'+Date.now(),date,title,desc,cat,amount,type:isIncome?'income':'expense',order:mo+1});
  saveTxs(txs);['fTitle','fDesc','fAmount'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fTitle').focus();render();
}

/* ── RECURRING ── */
function loadRecurs(){try{return JSON.parse(localStorage.getItem('budget_recur_'+curBook())||'[]');}catch(e){return [];}}
function saveRecurs(a){localStorage.setItem('budget_recur_'+curBook(),JSON.stringify(a));}
function addRecur(){
  const freq=document.getElementById('rFreq').value,title=document.getElementById('rTitle').value.trim();
  const desc=document.getElementById('rDesc').value.trim(),cat=document.getElementById('rCat').value;
  const raw=document.getElementById('rAmount').value.trim(),start=document.getElementById('rStart').value;
  if(!title||!raw||!start)return;
  const isIncome=raw.startsWith('+');
  const amount=parseInt(raw.replace(/[^0-9]/g,''));if(!amount)return;
  const recurs=loadRecurs();recurs.push({id:'r_'+Date.now(),freq,title,desc,cat,amount,type:isIncome?'income':'expense',start});
  saveRecurs(recurs);['rTitle','rDesc','rAmount'].forEach(id=>document.getElementById(id).value='');
  applyRecurs();render();
}
function delRecur(id){saveRecurs(loadRecurs().filter(r=>r.id!==id));render();}
function applyRecurs(){
  const recurs=loadRecurs();if(!recurs.length)return;
  let txs=loadTxs();const today=new Date();let changed=false;
  recurs.forEach(r=>{
    let d=new Date(r.start);
    while(d.getFullYear()<today.getFullYear()||(d.getFullYear()===today.getFullYear()&&d.getMonth()<=today.getMonth())){
      const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(!txs.some(t=>t.recurId===r.id&&t.date===ds)){
        const mo=txs.filter(t=>t.date===ds).reduce((m,t)=>Math.max(m,t.order||0),0);
        txs.push({id:'tx_'+Date.now()+Math.random(),date:ds,title:r.title,desc:r.desc,cat:r.cat,amount:r.amount,type:r.type,order:mo+1,recurId:r.id});
        changed=true;
      }
      if(r.freq==='weekly')d.setDate(d.getDate()+7);
      else if(r.freq==='monthly')d.setMonth(d.getMonth()+1);
      else d.setFullYear(d.getFullYear()+1);
    }
  });
  if(changed)saveTxs(txs);
}
function renderRecur(){
  const recurs=loadRecurs(),el=document.getElementById('recurListEl');
  if(!recurs.length){el.style.display='none';return;}
  el.style.display='block';
  const fl={weekly:'매주',monthly:'매월',yearly:'매년'};
  el.innerHTML=recurs.map(r=>`<div class="recur-item">
    <span style="color:var(--text1)">${r.title}${r.desc?' / '+r.desc:''}</span>
    <span style="color:var(--text2);font-size:12px">${fl[r.freq]}</span>
    <span style="color:var(--text2);font-size:13px">${r.cat}</span>
    <span style="font-weight:500;color:${r.type==='income'?'var(--green)':'var(--red)'}">${r.type==='income'?'+':'-'}${fmtW(r.amount)}</span>
    <button class="del-btn" onclick="delRecur('${r.id}')">✕</button>
  </div>`).join('');
}

/* ── CELL EDIT ── */
function startCellEdit(id,field){editingCell={id,field};render();setTimeout(()=>{const el=document.getElementById(`ci_${id}_${field}`);if(el){el.focus();el.select&&el.select();}},0);}
function commitCell(id,field){
  const el=document.getElementById(`ci_${id}_${field}`);if(!el)return;
  const txs=loadTxs();const i=txs.findIndex(t=>t.id===id);
  if(i<0){editingCell={id:null,field:null};return;}
  if(field==='amount'){const n=parseInt(el.value.replace(/[^0-9]/g,''));if(n>0)txs[i].amount=n;}
  else txs[i][field]=el.value;
  saveTxs(txs);editingCell={id:null,field:null};render();
}
function cellKey(e,id,f){if(e.key==='Enter'){e.preventDefault();commitCell(id,f);}if(e.key==='Escape'){editingCell={id:null,field:null};render();}}
function delTx(id){saveTxs(loadTxs().filter(t=>t.id!==id));render();}

/* ── FORMAT / SORT / FILTER ── */
function fmtW(n){return '₩'+n.toLocaleString('ko-KR');}
function fmtSum(n){return n.toLocaleString('ko-KR')+'원';}
function sortedFiltered(){
  let txs=loadTxs();
  if(filters.date)txs=txs.filter(t=>t.date.includes(filters.date));
  if(filters.title)txs=txs.filter(t=>(t.title||'').toLowerCase().includes(filters.title.toLowerCase()));
  if(filters.desc)txs=txs.filter(t=>(t.desc||'').toLowerCase().includes(filters.desc.toLowerCase()));
  if(filters.cat)txs=txs.filter(t=>t.cat===filters.cat);
  if(filters.amount)txs=txs.filter(t=>String(t.amount).includes(filters.amount.replace(/[^0-9]/g,'')));
  const dir=sortDir==='asc'?1:-1;
  txs.sort((a,b)=>{
    if(sortKey==='amount')return(a.amount-b.amount)*dir;
    let av=a[sortKey]??'',bv=b[sortKey]??'';
    if(av<bv)return -dir;if(av>bv)return dir;
    if(sortKey==='date')return(a.order||0)-(b.order||0);return 0;
  });
  return txs;
}
function toggleSort(key){if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';else{sortKey=key;sortDir=key==='date'||key==='amount'?'desc':'asc';}render();}

/* ── SUMMARY ── */
function renderSummary(txs){
  const income=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=income-expense;
  document.getElementById('sumIncome').textContent=fmtSum(income);
  document.getElementById('sumExpense').textContent=fmtSum(expense);
  const el=document.getElementById('sumBalance');el.textContent=fmtSum(bal);
  el.style.color=bal>=0?'var(--green)':'var(--red)';
}

/* ── TABLE ── */
function cellHtml(t,field){
  const isE=editingCell.id===t.id&&editingCell.field===field;
  const iid=`ci_${t.id}_${field}`;
  if(isE){
    if(field==='cat'){
      const opts=loadCats().map(c=>`<option${c===t.cat?' selected':''}>${c}</option>`).join('');
      return `<div class="cell-edit"><select id="${iid}" onchange="commitCell('${t.id}','cat')" onblur="commitCell('${t.id}','cat')" onkeydown="cellKey(event,'${t.id}','cat')" style="width:100%">${opts}</select></div>`;
    }
    const v=field==='amount'?t.amount:(t[field]||'');
    return `<div class="cell-edit"><input id="${iid}" type="${field==='amount'?'number':'text'}" value="${v}" onblur="commitCell('${t.id}','${field}')" onkeydown="cellKey(event,'${t.id}','${field}')" style="width:100%"></div>`;
  }
  if(field==='amount'){
    const sign=t.type==='income'?'+':'-';
    return `<div class="cell-inner amount-disp ${t.type}" onclick="startCellEdit('${t.id}','amount')">${sign}${fmtW(t.amount)}</div>`;
  }
  const disp=t[field]||'';
  const ph=field==='desc'?`<span style="color:var(--text3);font-size:12px">—</span>`:'';
  return `<div class="cell-inner" onclick="startCellEdit('${t.id}','${field}')">${disp||ph}</div>`;
}
function renderHeader(){
  const hr=document.getElementById('headerRow'),fr=document.getElementById('filterRow');
  const cats=loadCats();let hH='',fH='';
  colOrder.forEach((key,idx)=>{
    const col=ALL_COLS.find(c=>c.key===key);if(!col)return;
    const isSorted=sortKey===key,arrow=isSorted?(sortDir==='asc'?'↑':'↓'):'';
    const sA=key!=='_del'?`onclick="toggleSort('${key}')" style="cursor:pointer"`:'';
    const dA=key!=='_del'?`draggable="true" ondragstart="colDragStart(event,${idx})" ondragover="colDragOver(event,${idx})" ondrop="colDrop(event,${idx})" ondragend="colDragEnd()"`:'' ;
    hH+=`<th style="width:${col.w}" ${dA}><div class="th-inner" ${sA}>${key!=='_del'?`<span class="th-drag">⠿</span>`:''} ${col.label}${arrow?`<span class="sort-arrow">${arrow}</span>`:''}</div></th>`;
    if(key==='_del'){fH+='<td></td>';return;}
    if(key==='cat'){fH+=`<td><select onchange="filters.cat=this.value;render()"><option value="">전체</option>${cats.map(c=>`<option value="${c}"${filters.cat===c?' selected':''}>${c}</option>`).join('')}</select></td>`;}
    else fH+=`<td><input type="text" placeholder="검색" value="${filters[key]||''}" oninput="filters['${key}']=this.value;render()"></td>`;
  });
  hr.innerHTML=hH;fr.innerHTML=fH;
}
function renderList(txs){
  renderHeader();const body=document.getElementById('txBody');
  if(!txs.length){body.innerHTML=`<tr><td colspan="${colOrder.length}" class="empty">내역이 없습니다</td></tr>`;return;}
  body.innerHTML=txs.map(t=>`<tr draggable="true" data-id="${t.id}"
    ondragstart="rowDragStart(event,'${t.id}')" ondragover="rowDragOver(event,'${t.id}')"
    ondrop="rowDrop(event,'${t.id}')" ondragend="rowDragEnd()">
    ${colOrder.map(key=>key==='_del'
      ?`<td><button class="del-btn" onclick="delTx('${t.id}')">✕</button></td>`
      :`<td>${cellHtml(t,key)}</td>`).join('')}
  </tr>`).join('');
}
function colDragStart(e,idx){dragColFrom=idx;e.currentTarget.classList.add('th-dragging');}
function colDragOver(e,idx){e.preventDefault();document.querySelectorAll('#headerRow th').forEach((th,i)=>th.classList.toggle('th-drag-over',i===idx&&i!==dragColFrom));}
function colDrop(e,idx){e.preventDefault();if(dragColFrom===null||dragColFrom===idx)return;const a=[...colOrder];const[m]=a.splice(dragColFrom,1);a.splice(idx,0,m);colOrder=a;render();}
function colDragEnd(){dragColFrom=null;document.querySelectorAll('#headerRow th').forEach(th=>th.classList.remove('th-dragging','th-drag-over'));}
function rowDragStart(e,id){rowDragFromId=id;e.dataTransfer.effectAllowed='move';}
function rowDragOver(e,id){e.preventDefault();document.querySelectorAll('#txBody tr').forEach(tr=>tr.classList.toggle('row-drag-over',tr.dataset.id===String(id)&&id!==rowDragFromId));}
function rowDrop(e,toId){
  e.preventDefault();if(!rowDragFromId||rowDragFromId===toId)return;
  const txs=loadTxs(),from=txs.find(t=>t.id===rowDragFromId),to=txs.find(t=>t.id===toId);
  if(!from||!to||from.date!==to.date){rowDragFromId=null;return;}
  [from.order,to.order]=[to.order,from.order];saveTxs(txs);rowDragFromId=null;render();
}
function rowDragEnd(){rowDragFromId=null;document.querySelectorAll('#txBody tr').forEach(tr=>tr.classList.remove('row-drag-over'));}

/* ── CALENDAR ── */
function renderCalendar(){
  const lbl=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=curYear+'년 '+lbl[curMonth];
  const allTxs=loadTxs().filter(t=>{const d=new Date(t.date);return d.getFullYear()===curYear&&d.getMonth()===curMonth;});
  const sort=document.getElementById('calSort')?.value||'order';
  const today=new Date(),firstDay=new Date(curYear,curMonth,1).getDay(),dim=new Date(curYear,curMonth+1,0).getDate();
  const byDay={};
  allTxs.forEach(t=>{const d=parseInt(t.date.split('-')[2]);if(!byDay[d])byDay[d]=[];byDay[d].push(t);});
  Object.values(byDay).forEach(a=>{
    if(sort==='asc')a.sort((x,y)=>x.amount-y.amount);
    else if(sort==='desc')a.sort((x,y)=>y.amount-x.amount);
    else a.sort((x,y)=>(x.order||0)-(y.order||0));
  });
  const dows=['일','월','화','수','목','금','토'];
  let html='<div class="cal-header">'+dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')+'</div><div class="cal-grid">';
  for(let i=0;i<firstDay;i++)html+='<div class="cal-empty"></div>';
  for(let d=1;d<=dim;d++){
    const dow=(firstDay+d-1)%7;
    const isT=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    const dc='cal-day'+(isT?' today':dow===0?' sun':dow===6?' sat':'');
    const ds=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const items=(byDay[d]||[]).map(t=>`<div class="cal-item ${t.type}" draggable="true"
      ondragstart="calItemDragStart(event,'${t.id}')" ondragend="calItemDragEnd(event)"
      onclick="openCalPopup('${t.id}',null)"
    >${t.title||'(제목없음)'} ${t.type==='income'?'+':'-'}${fmtW(t.amount)}</div>`).join('');
    html+=`<div class="cal-cell" ondblclick="openCalPopup(null,'${ds}')"
      ondragover="event.preventDefault();this.classList.add('cal-drag-over')"
      ondragleave="this.classList.remove('cal-drag-over')"
      ondrop="calItemDrop(event,'${ds}')"
    ><div class="${dc}">${d}</div>${items}</div>`;
  }
  const rem=(7-((firstDay+dim)%7))%7;
  for(let i=0;i<rem;i++)html+='<div class="cal-empty"></div>';
  document.getElementById('calEl').innerHTML=html+'</div>';
}
function calItemDragStart(e,id){dragCalId=id;e.currentTarget.classList.add('dragging-cal');e.stopPropagation();}
function calItemDragEnd(e){e.currentTarget.classList.remove('dragging-cal');dragCalId=null;}
function calItemDrop(e,dateStr){
  e.preventDefault();document.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('cal-drag-over'));
  if(!dragCalId)return;const txs=loadTxs();const i=txs.findIndex(t=>t.id===dragCalId);if(i<0)return;
  txs[i].date=dateStr;const mo=txs.filter(t=>t.date===dateStr&&t.id!==dragCalId).reduce((m,t)=>Math.max(m,t.order||0),0);
  txs[i].order=mo+1;saveTxs(txs);dragCalId=null;renderCalendar();
}
function openCalPopup(id,date){
  calPopupId=id;calPopupDate=date;
  document.getElementById('cpCat').innerHTML=loadCats().map(c=>`<option>${c}</option>`).join('');
  document.getElementById('cpDelBtn').style.display=id?'block':'none';
  if(id){
    const tx=loadTxs().find(t=>t.id===id);if(!tx)return;
    document.getElementById('cpTitle_h').textContent='내역 수정';
    document.getElementById('cpDate').value=tx.date;document.getElementById('cpTitle').value=tx.title||'';
    document.getElementById('cpDesc').value=tx.desc||'';document.getElementById('cpCat').value=tx.cat;
    document.getElementById('cpAmount').value=tx.amount;document.getElementById('cpType').value=tx.type;
  }else{
    document.getElementById('cpTitle_h').textContent='새 내역 추가';
    document.getElementById('cpDate').value=date||todayStr();
    ['cpTitle','cpDesc'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('cpAmount').value='';document.getElementById('cpType').value='expense';
  }
  document.getElementById('calPopup').style.display='flex';
  setTimeout(()=>document.getElementById('cpTitle').focus(),50);
}
function closeCalPopup(){document.getElementById('calPopup').style.display='none';calPopupId=null;}
function saveCalPopup(){
  const amount=parseInt(document.getElementById('cpAmount').value)||0;if(!amount)return;
  const date=document.getElementById('cpDate').value;if(!date)return;
  const txs=loadTxs();
  if(calPopupId){
    const i=txs.findIndex(t=>t.id===calPopupId);if(i<0)return;
    Object.assign(txs[i],{date,title:document.getElementById('cpTitle').value.trim(),desc:document.getElementById('cpDesc').value.trim(),cat:document.getElementById('cpCat').value,amount,type:document.getElementById('cpType').value});
  }else{
    const mo=txs.filter(t=>t.date===date).reduce((m,t)=>Math.max(m,t.order||0),0);
    txs.push({id:'tx_'+Date.now(),date,title:document.getElementById('cpTitle').value.trim(),desc:document.getElementById('cpDesc').value.trim(),cat:document.getElementById('cpCat').value,amount,type:document.getElementById('cpType').value,order:mo+1});
  }
  saveTxs(txs);closeCalPopup();render();
}
function deleteCalPopupItem(){if(!calPopupId)return;saveTxs(loadTxs().filter(t=>t.id!==calPopupId));closeCalPopup();render();}

/* ── CAT / CSV ── */
function renderCatSelect(){const cats=loadCats();['fCat','rCat'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=cats.map(c=>`<option>${c}</option>`).join('');});}
function renderCatList(){document.getElementById('catListEl').innerHTML=loadCats().map((c,i)=>`<div class="cat-tag"><span>${c}</span><button class="cat-del-btn" onclick="delCat(${i})">✕</button></div>`).join('');}
function addCat(){const inp=document.getElementById('newCatInput');const name=inp.value.trim();if(!name)return;const cats=loadCats();if(!cats.includes(name)){cats.push(name);saveCats(cats);}inp.value='';renderCatSelect();renderCatList();}
function delCat(i){const cats=loadCats();cats.splice(i,1);saveCats(cats);renderCatSelect();renderCatList();}
function exportCSV(){
  const txs=sortedFiltered();if(!txs.length){alert('내역이 없습니다.');return;}
  const blob=new Blob(['\uFEFF날짜,제목,내용,카테고리,금액,유형\n'+txs.map(t=>`${t.date},"${t.title||''}","${t.desc||''}",${t.cat},${t.amount},${t.type==='income'?'수입':'지출'}`).join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='가계부.csv';a.click();URL.revokeObjectURL(url);
}

/* ── KEYBOARD / RENDER ── */
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&!e.shiftKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();}
  if(e.key==='Escape'){closeCalPopup();closeBookPopup();editingCell={id:null,field:null};render();}
});
function render(){
  renderBookBar();renderCatSelect();renderCatList();applyRecurs();
  const txs=sortedFiltered();renderSummary(txs);
  if(curView==='list')renderList(txs);
  if(curView==='calendar')renderCalendar();
  if(curView==='recur')renderRecur();
}
</script>
