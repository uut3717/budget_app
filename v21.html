<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>가계부</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
:root{
  --bg0:#0f1a14;--bg1:#162019;--bg2:#1e2d21;--bg3:#263529;
  --border:#3a4f3d;--border2:#4a6350;
  --text1:#d6ead9;--text2:#92b096;--text3:#5e7a62;
  --green:#4caf7d;--red:#e06c6c;--blue:#5b9bd5;--amber:#c8963e;
  --radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:var(--bg0);color:var(--text1);font-size:15px;min-height:100vh}
input,select,button,textarea{font-family:inherit;color:var(--text1)}
input,select{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:14px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--green)}
input::placeholder{color:var(--text3)}
.app{max-width:1060px;margin:0 auto;padding:1.2rem 1rem}

.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:18px}
.login-screen h2{font-size:22px;font-weight:500;color:var(--green)}
.login-screen p{font-size:14px;color:var(--text2);text-align:center;max-width:300px;line-height:1.7}
.google-btn{display:flex;align-items:center;gap:10px;padding:11px 22px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);cursor:pointer;font-size:14px;color:var(--text1)}
.google-btn:hover{background:var(--bg3)}
.google-btn svg{width:18px;height:18px;flex-shrink:0}

.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:0.5px solid var(--border)}
.app-title{font-size:17px;font-weight:500;color:var(--green)}
.user-info{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);object-fit:cover}
.user-avatar-ph{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2)}
.logout-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text2)}
.logout-btn:hover{color:var(--text1);border-color:var(--border2)}
.sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.book-bar{display:flex;align-items:center;gap:5px;margin-bottom:1rem;flex-wrap:wrap}
.book-tab{padding:6px 14px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;max-width:170px}
.book-tab.active{background:var(--bg3);color:var(--text1);border-color:var(--green);font-weight:500}
.book-tab:hover:not(.active){background:var(--bg2)}
.book-tab-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.book-tab .edit-tab-btn{font-size:11px;color:var(--text3);padding:0 2px;background:none;border:none;cursor:pointer}
.book-tab .edit-tab-btn:hover{color:var(--text1)}
.add-book-btn{padding:6px 10px;border:0.5px dashed var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:18px;color:var(--text3);line-height:1}
.add-book-btn:hover{color:var(--green);border-color:var(--green)}

.view-bar{display:flex;gap:5px;margin-bottom:1.1rem}
.vtab{padding:6px 16px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text2)}
.vtab.active{background:var(--bg3);color:var(--green);border-color:var(--green);font-weight:500}
.vtab:hover:not(.active){background:var(--bg2)}

.summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.1rem}
.scard{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px}
.scard-label{font-size:12px;color:var(--text2);margin-bottom:5px}
.scard-value{font-size:18px;font-weight:500}
.inc-c{color:var(--green)}.exp-c{color:var(--red)}

.section-title{font-size:12px;font-weight:500;color:var(--text2);margin:.9rem 0 6px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between}

.form-grid{display:grid;grid-template-columns:140px 1fr 1fr 160px 115px;gap:6px;margin-bottom:6px}
.add-row{display:flex;gap:7px;margin-bottom:6px}
.add-btn{flex:1;padding:7px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;color:var(--text1);font-size:13px}
.add-btn:hover{background:var(--bg3);border-color:var(--border2)}
.icon-btn{padding:5px 9px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:15px;color:var(--text2);line-height:1;display:inline-flex;align-items:center;justify-content:center}
.icon-btn:not(:disabled):hover{background:var(--bg3);color:var(--text1);border-color:var(--border2)}
.icon-btn:disabled{opacity:.3;cursor:default}
.hint-text{font-size:11px;color:var(--text3);margin-bottom:.8rem}

/* TABLE */
.tx-wrap{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.tx-table{width:100%;border-collapse:collapse;background:var(--bg1);table-layout:fixed}
.tx-table th{font-size:12px;font-weight:500;color:var(--text2);padding:0;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.th-inner{display:flex;align-items:center;gap:3px;padding:7px 9px;cursor:pointer;user-select:none;white-space:nowrap}
.th-inner:hover{color:var(--text1)}
.th-dh{cursor:grab;color:var(--text3);font-size:11px;margin-right:2px}
.sort-arrow{font-size:10px;color:var(--green)}
.th-dragging{opacity:.4}.th-drag-over{border-left:2px solid var(--green)}
.filter-row td{padding:3px 4px;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.filter-row input,.filter-row select{padding:4px 7px;font-size:12px;background:var(--bg1)}
.tx-table td{padding:0;border-bottom:0.5px solid var(--border);font-size:14px;vertical-align:middle;overflow:hidden}
.tx-table tbody tr:last-child td{border-bottom:none}
.tx-table tbody tr:hover td{background:var(--bg2)}
.tx-table tbody tr.row-drag-over td{border-top:2px solid var(--green)}
.cell-inner{padding:7px 9px;min-height:34px;display:flex;align-items:center;cursor:pointer;word-break:break-word;color:var(--text1)}
.cell-inner:hover{background:var(--bg3)}
/* 내용 칸은 넘치면 말줄임 */
.cell-desc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:100%}
.cell-edit input,.cell-edit select{border:none;border-bottom:1.5px solid var(--green);background:var(--bg3);padding:7px 9px;font-size:14px;width:100%;border-radius:0}
/* 날짜 수정 인풋 */
.date-edit-wrap{display:flex;flex-direction:column;background:var(--bg3);border-bottom:1.5px solid var(--green)}
.date-edit-wrap input{border:none;border-radius:0;background:transparent;padding:7px 9px;font-size:14px;width:100%}
.date-edit-hint{font-size:10px;color:var(--text3);padding:0 9px 4px;pointer-events:none}
/* col widths */
.col-acct{width:44px}.col-title{width:15%}.col-amount{width:106px}.col-date{width:82px}.col-cat{width:82px}.col-desc{width:160px}.col-del{width:30px;text-align:center}
.amount-disp{font-weight:500}
.amount-disp.inc{color:var(--green)}.amount-disp.exp{color:var(--red)}
.del-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:5px;width:100%}
.del-btn:hover{color:var(--red)}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:14px}
/* 계좌 아이콘 셀 */
.acct-icon-cell{display:flex;align-items:center;justify-content:center;padding:4px}
.acct-icon{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;flex-shrink:0;cursor:pointer}
.acct-icon img{width:100%;height:100%;object-fit:cover;border-radius:5px}
/* 계좌 select 드롭다운 */
.acct-select-wrap{padding:4px}
.acct-select-wrap select{font-size:12px;padding:4px 6px;width:100%}

/* CALENDAR */
.cal-controls{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.cal-controls select{width:auto;background:var(--bg2)}
.month-nav{display:flex;align-items:center;gap:7px}
.month-nav button{background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 10px;cursor:pointer;color:var(--text1);font-size:13px}
.month-nav button:hover{background:var(--bg3)}
.month-label{font-size:15px;font-weight:500;min-width:88px;text-align:center}
.cal{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg1)}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--border);background:var(--bg2)}
.cal-dow{text-align:center;padding:7px 4px;font-size:12px;color:var(--text2);font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:90px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:5px;transition:background .1s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--bg2)}
.cal-day{font-size:12px;color:var(--text2);margin-bottom:3px;user-select:none}
.cal-day.today{background:var(--green);color:#0f1a14;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:600}
.cal-day.sun{color:var(--red)}.cal-day.sat{color:var(--blue)}
.cal-item{font-size:11px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:3px}
.cal-item:hover{opacity:.8}
.cal-item.exp{background:rgba(224,108,108,.18);color:#f4a0a0}
.cal-item.inc{background:rgba(76,175,125,.18);color:#7fd4a8}
.cal-item.dragging-cal{opacity:.3}
.cal-cell.cal-drag-over{background:rgba(76,175,125,.1)}
.cal-empty{min-height:90px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);background:var(--bg0)}
.cal-empty:nth-child(7n){border-right:none}
.cal-item-icon{width:12px;height:12px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;overflow:hidden;flex-shrink:0}
.cal-item-icon img{width:100%;height:100%;object-fit:cover}

/* RECUR */
.recur-list{border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
.recur-item{display:grid;grid-template-columns:1fr 80px 90px 90px 32px;align-items:center;padding:8px 12px;gap:8px;border-bottom:0.5px solid var(--border);font-size:13px;background:var(--bg1)}
.recur-item:last-child{border-bottom:none}

/* SETTINGS */
.settings-section{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:1rem}
.settings-section h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.manage-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.manage-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);user-select:none}
.manage-item.drag-over{border-color:var(--green)}
.manage-dh{cursor:grab;color:var(--text3);font-size:14px;padding:0 2px}
.manage-icon{font-size:16px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;overflow:hidden;flex-shrink:0}
.manage-icon img{width:100%;height:100%;object-fit:cover}
.manage-name{flex:1;font-size:14px;color:var(--text1)}
.manage-btns{display:flex;gap:5px}
.sm-btn{padding:4px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:12px;color:var(--text2)}
.sm-btn:hover{background:var(--bg3);color:var(--text1)}
.sm-btn.danger:hover{color:var(--red);border-color:var(--red)}

.col-toggle-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.col-toggle{display:flex;align-items:center;gap:5px;padding:5px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);cursor:pointer;font-size:13px;color:var(--text2);user-select:none}
.col-toggle.active{background:var(--bg3);border-color:var(--green);color:var(--text1)}
.col-toggle:hover{background:var(--bg3)}

/* POPUP */
.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:900}
.popup{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:20px 22px;width:360px;max-width:96vw}
.popup h3{font-size:15px;font-weight:500;margin-bottom:12px;color:var(--text1)}
.pf{margin-bottom:9px}
.pf label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px}
.pf input,.pf select,.pf textarea{background:var(--bg3)}
.pf textarea{width:100%;padding:7px 9px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:12px;resize:vertical;min-height:60px;color:var(--text1)}
.pf textarea::placeholder{color:var(--text3)}
.popup-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.popup-btns button{padding:6px 14px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;background:none;color:var(--text1)}
.popup-btns button:hover{background:var(--bg3);border-color:var(--border2)}
.popup-btns .primary{border-color:var(--green);color:var(--green)}
.popup-btns .primary:hover{background:rgba(76,175,125,.12)}
.popup-btns .danger{border-color:var(--red);color:var(--red)}
.popup-btns .danger:hover{background:rgba(224,108,108,.12)}
.icon-type-row{display:flex;gap:6px;margin-bottom:8px}
.icon-type-btn{padding:5px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:12px;color:var(--text2)}
.icon-type-btn.active{background:var(--bg3);border-color:var(--green);color:var(--green)}
.icon-prev-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.icon-prev{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--bg3);font-size:22px;border:0.5px solid var(--border);overflow:hidden;flex-shrink:0}
.icon-prev img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.color-swatch.sel{border-color:var(--text1)}
</style>
</head>
<body>
<div class="app">

<div id="loginScreen" class="login-screen">
  <h2>가계부</h2>
  <p>Google 계정으로 로그인하면 내 Drive에 자동 저장됩니다.</p>
  <button class="google-btn" onclick="signIn()">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Google로 로그인
  </button>
</div>

<div id="mainApp" style="display:none">
  <div class="top-bar">
    <div class="app-title">가계부</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">대기 중</span></div>
      <div class="user-info"><div id="userAvatarWrap"></div><span id="userName"></span></div>
      <button class="logout-btn" onclick="signOut()">로그아웃</button>
    </div>
  </div>

  <div class="book-bar" id="bookBar"></div>

  <div class="view-bar">
    <button class="vtab active" onclick="switchView('list',this)">전체 내역</button>
    <button class="vtab" onclick="switchView('calendar',this)">캘린더</button>
    <button class="vtab" onclick="switchView('recur',this)">반복지출</button>
    <button class="vtab" onclick="switchView('settings',this)">설정</button>
  </div>

  <div class="summary">
    <div class="scard"><div class="scard-label">수입 합계</div><div class="scard-value inc-c" id="sumIncome">0원</div></div>
    <div class="scard"><div class="scard-label">지출 합계</div><div class="scard-value exp-c" id="sumExpense">0원</div></div>
    <div class="scard"><div class="scard-label">잔액</div><div class="scard-value" id="sumBalance">0원</div></div>
  </div>

  <div id="addForm">
    <div class="section-title">
      <span>내역 추가</span>
      <div style="display:flex;gap:5px">
        <button class="icon-btn" id="undoBtn" onclick="undo()" disabled title="Ctrl+Z">↩</button>
        <button class="icon-btn" id="redoBtn" onclick="redo()" disabled title="Ctrl+Y">↪</button>
        <button class="icon-btn" onclick="exportCSV()" title="CSV 내보내기">⬇</button>
      </div>
    </div>
    <div class="form-grid">
      <input type="date" id="fDate" onkeydown="fKey(event)">
      <input type="text" id="fTitle" placeholder="제목 (선택)" onkeydown="fKey(event)">
      <input type="text" id="fDesc" placeholder="내용" onkeydown="fKey(event)">
      <select id="fCat" onkeydown="fKey(event)"></select>
      <input type="text" id="fAmount" placeholder="금액 (+는 수입)" onkeydown="fKey(event)">
    </div>
    <div class="add-row">
      <select id="fAcct" style="flex:1;max-width:160px" onkeydown="fKey(event)"></select>
      <button class="add-btn" onclick="addTx()">+ 추가 · Enter</button>
    </div>
    <p class="hint-text">금액 앞에 + 를 붙이면 수입 / 제목은 선택사항</p>
  </div>

  <div id="viewList">
    <div class="tx-wrap">
      <table class="tx-table">
        <thead><tr id="headerRow"></tr><tr class="filter-row" id="filterRow"></tr></thead>
        <tbody id="txBody"></tbody>
      </table>
    </div>
  </div>

  <div id="viewCalendar" style="display:none">
    <div class="cal-controls">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <div class="month-label" id="calMonthLabel"></div>
        <button onclick="changeMonth(1)">&#8594;</button>
      </div>
      <select id="calSort" onchange="renderCalendar()" style="width:auto;background:var(--bg2)">
        <option value="order">순서</option><option value="asc">금액 낮은순</option><option value="desc">금액 높은순</option>
      </select>
    </div>
    <div class="cal" id="calEl"></div>
  </div>

  <div id="viewRecur" style="display:none">
    <div class="section-title">반복 내역</div>
    <div id="recurListEl" class="recur-list" style="display:none"></div>
    <div class="section-title" style="margin-top:.5rem">반복 내역 추가</div>
    <div class="form-grid" style="margin-bottom:6px">
      <select id="rFreq"><option value="weekly">매주</option><option value="monthly" selected>매월</option><option value="yearly">매년</option></select>
      <input type="text" id="rTitle" placeholder="제목 (선택)">
      <input type="text" id="rDesc" placeholder="내용">
      <select id="rCat"></select>
      <input type="text" id="rAmount" placeholder="금액 (+는 수입)">
    </div>
    <div class="add-row">
      <select id="rAcct" style="flex:none;width:140px"></select>
      <input style="flex:1" type="date" id="rStart">

<script>
const CLIENT_ID='275873536120-1r9pr1rt9j4tn55fpaf8jn2oecm2u2cq.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile';
const DRIVE_API='https://www.googleapis.com/drive/v3';
const SHEETS_API='https://sheets.googleapis.com/v4/spreadsheets';
const COLORS=['#4caf7d','#5b9bd5','#e06c6c','#c8963e','#9b6dd4','#d4537e','#888780','#3a9469'];

const DEFAULT_BOOKS=[{id:'main',name:'장부1'},{id:'book2',name:'장부2'}];
const DEFAULT_ACCTS=[
  {id:'a1',name:'메인계좌',icon:{type:'emoji',val:'🏦'}},
  {id:'a2',name:'체크카드',icon:{type:'emoji',val:'💳'}},
  {id:'a3',name:'쿠팡',icon:{type:'emoji',val:'🛒'}},
];
const DEFAULT_CATS=[
  {id:'c1',name:'식비',emoji:'🍽'},{id:'c2',name:'교통',emoji:'🚌'},
  {id:'c3',name:'주거',emoji:'🏠'},{id:'c4',name:'의료',emoji:'💊'},
  {id:'c5',name:'쇼핑',emoji:'🛍'},{id:'c6',name:'여가',emoji:'🎮'},
  {id:'c7',name:'급여',emoji:'💵'},{id:'c8',name:'부수입',emoji:'💰'},
  {id:'c9',name:'기타',emoji:'📌'},
];
const ALL_COLS_DEF=[
  {key:'_acct',label:'💎',w:'44px',hideable:true,labelFull:'계좌/카드'},
  {key:'title',label:'제목',w:'15%',hideable:true,labelFull:'제목'},
  {key:'amount',label:'금액',w:'106px',hideable:true,labelFull:'금액'},
  {key:'date',label:'날짜',w:'82px',hideable:true,labelFull:'날짜'},
  {key:'cat',label:'카테고리',w:'82px',hideable:true,labelFull:'카테고리'},
  {key:'desc',label:'내용',w:'160px',hideable:true,labelFull:'내용'},
  {key:'_del',label:'',w:'30px',hideable:false},
];

let accessToken=null,userProfile=null,sheetId=null;
let curView='list',curYear,curMonth;
let undoStack=[],redoStack=[];
let editingCell={id:null,field:null};
let calPopupId=null;
let acctPopupId=null,curIconType='emoji',selColor=COLORS[0];
let catPopupId=null,bookPopupId=null;
let txCache={};
let colOrder=ALL_COLS_DEF.map(c=>c.key);
let hiddenCols=new Set();
let sortKey='date',sortDir='desc';
let filters={date:'',title:'',desc:'',cat:'',_acct:'',amount:''};
let dragColFrom=null,rowDragFrom=null,dragCalId=null;
let acctDragFrom=null,catDragFrom=null;

/* ── DATA MIGRATION (이전 key 호환) ── */
function migrate(){
  // TX 마이그레이션: budget_txs_v4 → gab_txs_main
  ['main','book2'].forEach(bid=>{
    const newKey='gab_txs_'+bid;
    if(!localStorage.getItem(newKey)){
      const old=localStorage.getItem('budget_txs_v5')||localStorage.getItem('budget_txs_v4')||localStorage.getItem('budget_txs_v3')||localStorage.getItem('budget_txs_v2');
      if(old&&bid==='main')localStorage.setItem(newKey,old);
    }
  });
  // 카테고리: budget_cats_v1 → gab_cats
  if(!localStorage.getItem('gab_cats')){
    const old=localStorage.getItem('budget_cats_v1');
    if(old){
      try{
        const arr=JSON.parse(old);
        // 구버전은 문자열 배열, 신버전은 {id,name,emoji} 배열
        if(arr.length&&typeof arr[0]==='string'){
          const emojis={식비:'🍽',교통:'🚌',주거:'🏠',의료:'💊',쇼핑:'🛍',여가:'🎮',급여:'💵',부수입:'💰',기타:'📌'};
          const migrated=arr.map((n,i)=>({id:'c_'+i,name:n,emoji:emojis[n]||'📌'}));
          localStorage.setItem('gab_cats',JSON.stringify(migrated));
        } else localStorage.setItem('gab_cats',old);
      }catch(e){}
    }
  }
  // 계좌: gab_accts (신규 앱이라 이전 데이터 없음)
  // 장부: gab_books
  if(!localStorage.getItem('gab_books')){
    const old=localStorage.getItem('budget_books_v2')||localStorage.getItem('budget_books');
    if(old)localStorage.setItem('gab_books',old);
  }
}

/* ── STORAGE ── */
function getBooks(){try{return JSON.parse(localStorage.getItem('gab_books')||'null')||DEFAULT_BOOKS.map(b=>({...b}));}catch(e){return DEFAULT_BOOKS.map(b=>({...b}));}}
function saveBooks(b){localStorage.setItem('gab_books',JSON.stringify(b));}
function curBook(){return localStorage.getItem('gab_cur_book')||getBooks()[0].id;}
function setCurBook(id){localStorage.setItem('gab_cur_book',id);}
function getAccts(){try{const s=localStorage.getItem('gab_accts');return s?JSON.parse(s):DEFAULT_ACCTS.map(a=>({...a}));}catch(e){return DEFAULT_ACCTS.map(a=>({...a}));}}
function saveAccts(a){localStorage.setItem('gab_accts',JSON.stringify(a));}
function getCats(){try{const s=localStorage.getItem('gab_cats');return s?JSON.parse(s):DEFAULT_CATS.map(c=>({...c}));}catch(e){return DEFAULT_CATS.map(c=>({...c}));}}
function saveCats(c){localStorage.setItem('gab_cats',JSON.stringify(c));}
function loadHidden(){try{return new Set(JSON.parse(localStorage.getItem('gab_hidden')||'[]'));}catch(e){return new Set();}}
function saveHidden(){localStorage.setItem('gab_hidden',JSON.stringify([...hiddenCols]));}

/* ── AUTH ── */
let tokenClient;
function initGSI(){
  if(typeof google==='undefined'||!google.accounts){setTimeout(initGSI,100);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:async(resp)=>{
      if(resp.error){setSyncStatus('err','로그인 실패');return;}
      accessToken=resp.access_token;localStorage.setItem('gtoken',accessToken);
      await fetchUserProfile();await showApp();
    }
  });
  const saved=localStorage.getItem('gtoken');
  if(saved){accessToken=saved;fetchUserProfile().then(()=>showApp());}
}
function signIn(){if(!tokenClient){alert('잠시 후 다시 시도하세요.');return;}tokenClient.requestAccessToken({prompt:''});}
function signOut(){accessToken=null;localStorage.removeItem('gtoken');sheetId=null;txCache={};document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';}
async function fetchUserProfile(){
  try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{'Authorization':'Bearer '+accessToken}});if(r.ok){userProfile=await r.json();renderUserInfo();}}catch(e){}
}
function renderUserInfo(){
  const w=document.getElementById('userAvatarWrap');
  if(userProfile?.picture)w.innerHTML=`<img class="user-avatar" src="${userProfile.picture}" alt="" onerror="this.style.display='none'">`;
  else w.innerHTML=`<div class="user-avatar-ph">${(userProfile?.name||'?')[0]}</div>`;
  document.getElementById('userName').textContent=userProfile?.name||userProfile?.email||'';
}

/* ── SHEETS ── */
function setSyncStatus(s,m){const d=document.getElementById('syncDot'),l=document.getElementById('syncLabel');d.className='sync-dot'+(s?' '+s:'');l.textContent=m;}
async function apiReq(method,url,body){
  setSyncStatus('syncing','동기화 중...');
  try{
    const r=await fetch(url,{method,headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
    if(r.status===401){setSyncStatus('err','인증 만료');tokenClient.requestAccessToken({prompt:''});return null;}
    const d=await r.json();setSyncStatus('ok','동기화 완료');return d;
  }catch(e){setSyncStatus('err','동기화 실패');return null;}
}
function enc(s){return encodeURIComponent(s);}

async function ensureSheetId(){
  const cached=localStorage.getItem('gab_sheet_id');
  if(cached){sheetId=cached;return;}
  setSyncStatus('syncing','스프레드시트 찾는 중...');
  const q=encodeURIComponent("name='budget data' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false");
  const r=await fetch(`${DRIVE_API}/files?q=${q}&fields=files(id)`,{headers:{'Authorization':'Bearer '+accessToken}});
  if(r.ok){const d=await r.json();if(d.files?.length){sheetId=d.files[0].id;localStorage.setItem('gab_sheet_id',sheetId);return;}}
  const names=getBooks().map(b=>b.id);
  const cr=await apiReq('POST',SHEETS_API,{properties:{title:'budget data'},sheets:names.map(n=>({properties:{title:n}}))});
  if(cr?.spreadsheetId){
    sheetId=cr.spreadsheetId;localStorage.setItem('gab_sheet_id',sheetId);
    for(const n of names)await apiReq('PUT',`${SHEETS_API}/${sheetId}/values/${enc(n+'!A1:I1')}?valueInputOption=RAW`,{values:[['ID','날짜','제목','내용','카테고리','계좌ID','금액','유형','순서']]});
  }
}
async function ensureSheetExists(name){
  const d=await apiReq('GET',`${SHEETS_API}/${sheetId}?fields=sheets.properties.title`);
  if(!d?.sheets?.map(s=>s.properties.title).includes(name)){
    await apiReq('POST',`${SHEETS_API}/${sheetId}:batchUpdate`,{requests:[{addSheet:{properties:{title:name}}}]});
    await apiReq('PUT',`${SHEETS_API}/${sheetId}/values/${enc(name+'!A1:I1')}?valueInputOption=RAW`,{values:[['ID','날짜','제목','내용','카테고리','계좌ID','금액','유형','순서']]});
  }
}
async function loadFromSheet(){
  const sheet=curBook();
  const d=await apiReq('GET',`${SHEETS_API}/${sheetId}/values/${enc(sheet+'!A:I')}`);
  const rows=d?.values||[];
  txCache[sheet]=rows.length<=1?[]:rows.slice(1).filter(r=>r[0]).map(r=>({
    id:r[0],date:r[1]||'',title:r[2]||'',desc:r[3]||'',cat:r[4]||'',
    acctId:r[5]||'',amount:parseInt(r[6])||0,type:r[7]==='수입'?'income':'expense',order:parseInt(r[8])||0
  }));
}
async function saveToSheet(){
  const sheet=curBook(),txs=txCache[sheet]||[];
  const rows=[['ID','날짜','제목','내용','카테고리','계좌ID','금액','유형','순서'],
    ...txs.map(t=>[t.id,t.date,t.title||'',t.desc||'',t.cat||'',t.acctId||'',t.amount,t.type==='income'?'수입':'지출',t.order||0])
  ];
  await apiReq('PUT',`${SHEETS_API}/${sheetId}/values/${enc(sheet+'!A1')}?valueInputOption=RAW`,{values:rows});
}
async function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  hiddenCols=loadHidden();initDate();document.getElementById('fDate').value=todayStr();
  await ensureSheetId();await loadFromSheet();render();
}

/* ── TX ── */
function loadTxs(){
  // 로컬 캐시 우선, 없으면 localStorage에서 직접
  const s=curBook();
  if(!txCache[s]){
    try{txCache[s]=JSON.parse(localStorage.getItem('gab_txs_'+s)||'[]');}catch(e){txCache[s]=[];}
  }
  return txCache[s];
}
function saveTxs(arr){
  const s=curBook();undoStack.push(JSON.stringify(txCache[s]||[]));if(undoStack.length>50)undoStack.shift();redoStack=[];
  txCache[s]=arr;localStorage.setItem('gab_txs_'+s,JSON.stringify(arr));
  updateHistBtns();saveToSheet();
}
function undo(){if(!undoStack.length)return;const s=curBook();redoStack.push(JSON.stringify(txCache[s]||[]));const prev=JSON.parse(undoStack.pop());txCache[s]=prev;localStorage.setItem('gab_txs_'+s,JSON.stringify(prev));updateHistBtns();saveToSheet();render();}
function redo(){if(!redoStack.length)return;const s=curBook();undoStack.push(JSON.stringify(txCache[s]||[]));const next=JSON.parse(redoStack.pop());txCache[s]=next;localStorage.setItem('gab_txs_'+s,JSON.stringify(next));updateHistBtns();saveToSheet();render();}
function updateHistBtns(){document.getElementById('undoBtn').disabled=!undoStack.length;document.getElementById('redoBtn').disabled=!redoStack.length;}

/* ── DATE UTILS ── */
function initDate(){const d=new Date();curYear=d.getFullYear();curMonth=d.getMonth();}
function changeMonth(d){curMonth+=d;if(curMonth<0){curMonth=11;curYear--;}if(curMonth>11){curMonth=0;curYear++;}renderCalendar();}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
// 26-04-14 형식으로 표시
function fmtDate(s){if(!s)return '';const p=s.split('-');if(p.length<3)return s;return p[0].slice(-2)+'-'+p[1]+'-'+p[2];}
// 날짜 ±1일
function shiftDate(dateStr,delta){
  if(!dateStr)return dateStr;
  const d=new Date(dateStr);d.setDate(d.getDate()+delta);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/* ── VIEW ── */
function switchView(name,el){
  curView=name;
  ['list','calendar','recur','settings'].forEach(v=>document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).style.display=v===name?'block':'none');
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));el.classList.add('active');
  document.getElementById('addForm').style.display=name==='settings'||name==='recur'?'none':'block';
  render();
}

/* ── BOOK BAR ── */
function renderBookBar(){
  const books=getBooks(),cur=curBook();
  let h=books.map(b=>`<button class="book-tab${b.id===cur?' active':''}" onclick="switchBook('${b.id}')">
    <span class="book-tab-name">${b.name}</span>
    <button class="edit-tab-btn" onclick="event.stopPropagation();openBookPopup('${b.id}')" title="편집">✎</button>
  </button>`).join('');
  h+=`<button class="add-book-btn" onclick="addBook()">+</button>`;
  document.getElementById('bookBar').innerHTML=h;
}
async function switchBook(id){setCurBook(id);undoStack=[];redoStack=[];updateHistBtns();if(!txCache[id])await loadFromSheet();render();}
async function addBook(){
  const books=getBooks();const id='book_'+Date.now();const num=books.length+1;
  books.push({id,name:'장부'+num});saveBooks(books);setCurBook(id);
  await ensureSheetExists(id);txCache[id]=[];render();openBookPopup(id);
}
function openBookPopup(id){
  bookPopupId=id;const books=getBooks();const book=books.find(b=>b.id===id)||{name:''};
  document.getElementById('bookPopupName').value=book.name;
  document.getElementById('bookDelBtn').style.display=books.length>1?'block':'none';
  document.getElementById('bookPopup').style.display='flex';
  setTimeout(()=>document.getElementById('bookPopupName').focus(),50);
}
function closeBookPopup(){document.getElementById('bookPopup').style.display='none';bookPopupId=null;}
function saveBookPopup(){const name=document.getElementById('bookPopupName').value.trim();if(!name)return;const books=getBooks();const i=books.findIndex(b=>b.id===bookPopupId);if(i>=0){books[i].name=name;saveBooks(books);}closeBookPopup();renderBookBar();}
function deleteBookFromPopup(){const books=getBooks();if(books.length<=1)return;const nb=books.filter(b=>b.id!==bookPopupId);saveBooks(nb);if(curBook()===bookPopupId)setCurBook(nb[0].id);closeBookPopup();render();}

/* ── ADD TX ── */
function fKey(e){if(e.key==='Enter'){e.preventDefault();addTx();}}
function addTx(){
  const date=document.getElementById('fDate').value;
  const title=document.getElementById('fTitle').value.trim();
  const desc=document.getElementById('fDesc').value.trim();
  const cat=document.getElementById('fCat').value;
  const acctId=document.getElementById('fAcct').value;
  const raw=document.getElementById('fAmount').value.trim();
  if(!date||!raw)return; // 제목 없어도 OK
  const isIncome=raw.startsWith('+');
  const amount=parseInt(raw.replace(/[^0-9]/g,''));if(!amount)return;
  const txs=loadTxs();
  const mo=txs.filter(t=>t.date===date).reduce((m,t)=>Math.max(m,t.order||0),0);
  txs.push({id:'tx_'+Date.now(),date,title,desc,cat,acctId,amount,type:isIncome?'income':'expense',order:mo+1});
  saveTxs(txs);['fTitle','fDesc','fAmount'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fAmount').focus();render();
}

/* ── RECURRING ── */
function loadRecurs(){try{return JSON.parse(localStorage.getItem('gab_recur_'+curBook())||'[]');}catch(e){return [];}}
function saveRecurs(a){localStorage.setItem('gab_recur_'+curBook(),JSON.stringify(a));}
function addRecur(){
  const freq=document.getElementById('rFreq').value;
  const title=document.getElementById('rTitle').value.trim();
  const desc=document.getElementById('rDesc').value.trim();
  const cat=document.getElementById('rCat').value;
  const acctId=document.getElementById('rAcct').value;
  const raw=document.getElementById('rAmount').value.trim();
  const start=document.getElementById('rStart').value;
  if(!raw||!start)return;
  const isIncome=raw.startsWith('+');
  const amount=parseInt(raw.replace(/[^0-9]/g,''));if(!amount)return;
  const recurs=loadRecurs();
  recurs.push({id:'r_'+Date.now(),freq,title,desc,cat,acctId,amount,type:isIncome?'income':'expense',start});
  saveRecurs(recurs);['rTitle','rDesc','rAmount'].forEach(id=>document.getElementById(id).value='');
  applyRecurs();render();
}
function delRecur(id){saveRecurs(loadRecurs().filter(r=>r.id!==id));render();}
function applyRecurs(){
  const recurs=loadRecurs();if(!recurs.length)return;
  let txs=loadTxs();const today=new Date();let changed=false;
  recurs.forEach(r=>{
    let d=new Date(r.start);
    while(d.getFullYear()<today.getFullYear()||(d.getFullYear()===today.getFullYear()&&d.getMonth()<=today.getMonth())){
      const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(!txs.some(t=>t.recurId===r.id&&t.date===ds)){
        const mo=txs.filter(t=>t.date===ds).reduce((m,t)=>Math.max(m,t.order||0),0);
        txs.push({id:'tx_'+Date.now()+Math.random(),date:ds,title:r.title||'',desc:r.desc||'',cat:r.cat,acctId:r.acctId||'',amount:r.amount,type:r.type,order:mo+1,recurId:r.id});
        changed=true;
      }
      if(r.freq==='weekly')d.setDate(d.getDate()+7);
      else if(r.freq==='monthly')d.setMonth(d.getMonth()+1);
      else d.setFullYear(d.getFullYear()+1);
    }
  });
  if(changed)saveTxs(txs);
}
function renderRecur(){
  const recurs=loadRecurs(),el=document.getElementById('recurListEl');
  if(!recurs.length){el.style.display='none';return;}el.style.display='block';
  const fl={weekly:'매주',monthly:'매월',yearly:'매년'};
  el.innerHTML=recurs.map(r=>`<div class="recur-item">
    <span style="color:var(--text1)">${r.title||'(제목없음)'}${r.desc?' / '+r.desc:''}</span>
    <span style="color:var(--text2);font-size:12px">${fl[r.freq]}</span>
    <span style="color:var(--text2);font-size:13px">${r.cat}</span>
    <span style="font-weight:500;color:${r.type==='income'?'var(--green)':'var(--red)'}">${r.type==='income'?'+':'-'}${fmtW(r.amount)}</span>
    <button class="del-btn" onclick="delRecur('${r.id}')">✕</button>
  </div>`).join('');
}

/* ── CELL EDIT ── */
function startCellEdit(id,field){editingCell={id,field};render();setTimeout(()=>{const el=document.getElementById(`ci_${id}_${field}`);if(el){el.focus();el.select&&el.select();}},0);}
function commitCell(id,field,val){
  const v=val!==undefined?val:(document.getElementById(`ci_${id}_${field}`)?.value);
  if(v===undefined)return;
  const txs=loadTxs();const i=txs.findIndex(t=>t.id===id);
  if(i<0){editingCell={id:null,field:null};return;}
  if(field==='amount'){const raw=String(v).trim();const isIncome=raw.startsWith('+');const n=parseInt(raw.replace(/[^0-9]/g,''));if(n>0){txs[i].amount=n;txs[i].type=isIncome?'income':'expense';}}
  else txs[i][field]=v;
  saveTxs(txs);editingCell={id:null,field:null};render();
}
function cellKey(e,id,f){
  if(e.key==='Enter'){e.preventDefault();commitCell(id,f);}
  if(e.key==='Escape'){editingCell={id:null,field:null};render();}
}
// 날짜 셀 휠
function dateWheel(e,id){
  e.preventDefault();
  const txs=loadTxs();const i=txs.findIndex(t=>t.id===id);if(i<0)return;
  txs[i].date=shiftDate(txs[i].date,e.deltaY<0?1:-1);

}

/* ── FORMAT ── */
function fmtW(n){return '₩'+n.toLocaleString('ko-KR');}
function fmtSum(n){return n.toLocaleString('ko-KR')+'원';}

/* ── ICON HELPERS ── */
function iconHtml(icon){
  if(!icon)return '💳';
  if(icon.type==='emoji')return icon.val||'💳';
  if(icon.type==='color')return `<span style="font-size:11px;font-weight:700;color:#fff">${icon.label||'?'}</span>`;
  if(icon.type==='base64')return `<img src="data:image/webp;base64,${icon.val}" style="width:100%;height:100%;object-fit:cover;border-radius:5px">`;
  return '💳';
}
function iconBg(icon){return icon?.type==='color'?(icon.color||'#4caf7d'):'var(--bg3)';}
// 아이콘만 표시 (텍스트 없음)
function acctIconOnly(acctId){
  if(!acctId)return `<div class="acct-icon-cell"><div class="acct-icon" style="background:var(--bg3);color:var(--text3);font-size:11px" title="계좌 없음">—</div></div>`;
  const a=getAccts().find(x=>x.id===acctId);
  if(!a)return `<div class="acct-icon-cell"><div class="acct-icon" style="background:var(--bg3);color:var(--text3)">?</div></div>`;
  return `<div class="acct-icon-cell"><div class="acct-icon" style="background:${iconBg(a.icon)}" title="${a.name}">${iconHtml(a.icon)}</div></div>`;
}

/* ── SORT/FILTER ── */
function sortedFiltered(){
  let txs=loadTxs();
  if(filters.date)txs=txs.filter(t=>t.date.includes(filters.date));
  if(filters.title)txs=txs.filter(t=>(t.title||'').toLowerCase().includes(filters.title.toLowerCase()));
  if(filters.desc)txs=txs.filter(t=>(t.desc||'').toLowerCase().includes(filters.desc.toLowerCase()));
  if(filters.cat)txs=txs.filter(t=>t.cat===filters.cat);
  if(filters._acct)txs=txs.filter(t=>t.acctId===filters._acct);
  if(filters.amount)txs=txs.filter(t=>String(t.amount).includes(filters.amount.replace(/[^0-9]/g,'')));
  const dir=sortDir==='asc'?1:-1;
  txs.sort((a,b)=>{
    if(sortKey==='amount')return(a.amount-b.amount)*dir;
    let av=a[sortKey]??'',bv=b[sortKey]??'';
    if(av<bv)return -dir;if(av>bv)return dir;
    if(sortKey==='date')return(a.order||0)-(b.order||0);return 0;
  });
  return txs;
}
function toggleSort(key){if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';else{sortKey=key;sortDir=key==='date'||key==='amount'?'desc':'asc';}render();}

/* ── SUMMARY ── */
function renderSummary(txs){
  const income=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=income-expense;
  document.getElementById('sumIncome').textContent=fmtSum(income);
  document.getElementById('sumExpense').textContent=fmtSum(expense);
  const el=document.getElementById('sumBalance');el.textContent=fmtSum(bal);
  el.style.color=bal>=0?'var(--green)':'var(--red)';
}

function cellHtml(t,field){
  const isE=editingCell.id===t.id&&editingCell.field===field;
  const iid=`ci_${t.id}_${field}`;

  // 계좌 아이콘 (클릭 시 select 드롭다운)
  if(field==='_acct'){
    if(isE){
      const accts=getAccts();
      const opts='<option value="">미지정</option>'+accts.map(a=>`<option value="${a.id}"${a.id===t.acctId?' selected':''}>${a.name}</option>`).join('');
      return `<div class="acct-select-wrap"><select id="${iid}" onchange="commitCell('${t.id}','acctId',this.value)" onblur="commitCell('${t.id}','acctId',this.value)" onkeydown="if(event.key==='Escape'){editingCell={id:null,field:null};render();}">${opts}</select></div>`;
    }
    return `<div onclick="startCellEdit('${t.id}','_acct')">${acctIconOnly(t.acctId)}</div>`;
  }

  if(isE){
    // 날짜 편집: 텍스트 input + 휠 힌트
    if(field==='date'){
      return `<div class="date-edit-wrap" onwheel="dateWheelEdit(event,'${t.id}')">
        <input id="${iid}" type="text" value="${t.date}"
          onblur="commitCell('${t.id}','date')"
          onkeydown="cellKey(event,'${t.id}','date')" style="width:100%">
        <span class="date-edit-hint">↑↓ 스크롤로 날짜 변경</span>
      </div>`;
    }
    if(field==='cat'){
      const cats=getCats();const opts=cats.map(c=>`<option value="${c.name}"${c.name===t.cat?' selected':''}>${c.emoji||''} ${c.name}</option>`).join('');
      return `<div class="cell-edit"><select id="${iid}" onchange="commitCell('${t.id}','cat')" onblur="commitCell('${t.id}','cat')" onkeydown="cellKey(event,'${t.id}','cat')" style="width:100%">${opts}</select></div>`;
    }
    const v=field==='amount'?(t.type==='income'?'+':'')+t.amount:(t[field]||'');
    return `<div class="cell-edit"><input id="${iid}" type="text" value="${v}" onblur="commitCell('${t.id}','${field}')" onkeydown="cellKey(event,'${t.id}','${field}')" style="width:100%"></div>`;
  }

  if(field==='amount'){const sign=t.type==='income'?'+':'-';return `<div class="cell-inner amount-disp ${t.type}" onclick="startCellEdit('${t.id}','amount')">${sign}${fmtW(t.amount)}</div>`;}
  if(field==='date'){return `<div class="cell-inner" onclick="startCellEdit('${t.id}','date')" onwheel="dateWheel(event,'${t.id}')" style="cursor:pointer">${fmtDate(t.date)}</div>`;}
  if(field==='desc'){
    const disp=t.desc||'';
    return `<div class="cell-inner" onclick="startCellEdit('${t.id}','desc')"><span class="cell-desc" title="${disp}">${disp||'<span style="color:var(--text3);font-size:12px">—</span>'}</span></div>`;
  }
  const disp=t[field]||'';
  return `<div class="cell-inner" onclick="startCellEdit('${t.id}','${field}')">${disp||`<span style="color:var(--text3);font-size:12px">—</span>`}</div>`;
}

/* col drag */
function colDragStart(e,idx){dragColFrom=idx;e.currentTarget.classList.add('th-dragging');}
function colDragOver(e,idx){e.preventDefault();document.querySelectorAll('#headerRow th').forEach((th,i)=>th.classList.toggle('th-drag-over',i===idx&&i!==dragColFrom));}
function colDrop(e,idx){
  e.preventDefault();if(dragColFrom===null||dragColFrom===idx)return;
  const vc=visibleCols();const ak=vc[dragColFrom],tk=vc[idx];
  const ai=colOrder.indexOf(ak),ti=colOrder.indexOf(tk);
  if(ai<0||ti<0)return;const a=[...colOrder];const[m]=a.splice(ai,1);a.splice(ti,0,m);colOrder=a;render();
}
function colDragEnd(){dragColFrom=null;document.querySelectorAll('#headerRow th').forEach(th=>th.classList.remove('th-dragging','th-drag-over'));}
/* row drag */
function rowDragStart(e,id){rowDragFrom=id;e.dataTransfer.effectAllowed='move';}
function rowDragOver(e,id){e.preventDefault();document.querySelectorAll('#txBody tr').forEach(tr=>tr.classList.toggle('row-drag-over',tr.dataset.id===String(id)&&id!==rowDragFrom));}
function rowDrop(e,toId){
  e.preventDefault();if(!rowDragFrom||rowDragFrom===toId)return;
  const txs=loadTxs(),from=txs.find(t=>t.id===rowDragFrom),to=txs.find(t=>t.id===toId);
  if(!from||!to||from.date!==to.date){rowDragFrom=null;return;}
  [from.order,to.order]=[to.order,from.order];saveTxs(txs);rowDragFrom=null;render();
}
function rowDragEnd(){rowDragFrom=null;document.querySelectorAll('#txBody tr').forEach(tr=>tr.classList.remove('row-drag-over'));}

/* ── CALENDAR ── */
function renderCalendar(){
  const lbl=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=curYear+'년 '+lbl[curMonth];
  const allTxs=loadTxs().filter(t=>{const d=new Date(t.date);return d.getFullYear()===curYear&&d.getMonth()===curMonth;});
  const sort=document.getElementById('calSort')?.value||'order';
  const today=new Date(),firstDay=new Date(curYear,curMonth,1).getDay(),dim=new Date(curYear,curMonth+1,0).getDate();
  const byDay={};allTxs.forEach(t=>{const d=parseInt(t.date.split('-')[2]);if(!byDay[d])byDay[d]=[];byDay[d].push(t);});
  Object.values(byDay).forEach(a=>{if(sort==='asc')a.sort((x,y)=>x.amount-y.amount);else if(sort==='desc')a.sort((x,y)=>y.amount-x.amount);else a.sort((x,y)=>(x.order||0)-(y.order||0));});
  const accts=getAccts();
  const dows=['일','월','화','수','목','금','토'];
  let html='<div class="cal-header">'+dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')+'</div><div class="cal-grid">';
  for(let i=0;i<firstDay;i++)html+='<div class="cal-empty"></div>';
  for(let d=1;d<=dim;d++){
    const dow=(firstDay+d-1)%7;
    const isT=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    const dc='cal-day'+(isT?' today':dow===0?' sun':dow===6?' sat':'');
    const ds=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const items=(byDay[d]||[]).map(t=>{
      const acct=accts.find(a=>a.id===t.acctId);
      const ico=acct?`<span class="cal-item-icon" style="background:${iconBg(acct.icon)}">${iconHtml(acct.icon)}</span> `:'';
      return `<div class="cal-item ${t.type}" draggable="true"
        ondragstart="calItemDragStart(event,'${t.id}')" ondragend="calItemDragEnd(event)"
        onclick="openCalPopup('${t.id}',null)">${ico}${t.title||'('+fmtW(t.amount)+')'} ${t.type==='income'?'+':'-'}${fmtW(t.amount)}</div>`;
    }).join('');
    html+=`<div class="cal-cell" ondblclick="openCalPopup(null,'${ds}')"
      ondragover="event.preventDefault();this.classList.add('cal-drag-over')"
      ondragleave="this.classList.remove('cal-drag-over')"
      ondrop="calItemDrop(event,'${ds}')">
      <div class="${dc}">${d}</div>${items}</div>`;
  }
  const rem=(7-((firstDay+dim)%7))%7;
  for(let i=0;i<rem;i++)html+='<div class="cal-empty"></div>';
  document.getElementById('calEl').innerHTML=html+'</div>';
}
function calItemDragStart(e,id){dragCalId=id;e.currentTarget.classList.add('dragging-cal');e.stopPropagation();}
function calItemDragEnd(e){e.currentTarget.classList.remove('dragging-cal');dragCalId=null;}
function calItemDrop(e,dateStr){
  e.preventDefault();document.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('cal-drag-over'));
  if(!dragCalId)return;const txs=loadTxs();const i=txs.findIndex(t=>t.id===dragCalId);if(i<0)return;
  txs[i].date=dateStr;const mo=txs.filter(t=>t.date===dateStr&&t.id!==dragCalId).reduce((m,t)=>Math.max(m,t.order||0),0);
  txs[i].order=mo+1;saveTxs(txs);dragCalId=null;renderCalendar();
}
function openCalPopup(id,date){
  calPopupId=id;
  const cats=getCats();const accts=getAccts();
  document.getElementById('cpCat').innerHTML=cats.map(c=>`<option value="${c.name}">${c.emoji||''} ${c.name}</option>`).join('');
  document.getElementById('cpAcct').innerHTML='<option value="">미지정</option>'+accts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  document.getElementById('cpDelBtn').style.display=id?'block':'none';
  if(id){
    const tx=loadTxs().find(t=>t.id===id);if(!tx)return;
    document.getElementById('cpTitleH').textContent='내역 수정';
    document.getElementById('cpDate').value=tx.date;
    document.getElementById('cpTitle').value=tx.title||'';
    document.getElementById('cpDesc').value=tx.desc||'';
    document.getElementById('cpCat').value=tx.cat;
    document.getElementById('cpAcct').value=tx.acctId||'';
    document.getElementById('cpAmount').value=(tx.type==='income'?'+':'')+tx.amount;
  } else {
    document.getElementById('cpTitleH').textContent='새 내역 추가';
    document.getElementById('cpDate').value=date||todayStr();
    ['cpTitle','cpDesc','cpAmount'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('cpAcct').value='';
  }
  document.getElementById('calPopup').style.display='flex';
  setTimeout(()=>document.getElementById('cpAmount').focus(),50);
}
function closeCalPopup(){document.getElementById('calPopup').style.display='none';calPopupId=null;}
function saveCalPopup(){
  const raw=document.getElementById('cpAmount').value.trim();if(!raw)return;
  const isIncome=raw.startsWith('+');const amount=parseInt(raw.replace(/[^0-9]/g,''));if(!amount)return;
  const date=document.getElementById('cpDate').value;if(!date)return;
  const txs=loadTxs();
  if(calPopupId){
    const i=txs.findIndex(t=>t.id===calPopupId);if(i<0)return;
    Object.assign(txs[i],{date,title:document.getElementById('cpTitle').value.trim(),desc:document.getElementById('cpDesc').value.trim(),cat:document.getElementById('cpCat').value,acctId:document.getElementById('cpAcct').value,amount,type:isIncome?'income':'expense'});
  } else {
    const mo=txs.filter(t=>t.date===date).reduce((m,t)=>Math.max(m,t.order||0),0);
    txs.push({id:'tx_'+Date.now(),date,title:document.getElementById('cpTitle').value.trim(),desc:document.getElementById('cpDesc').value.trim(),cat:document.getElementById('cpCat').value,acctId:document.getElementById('cpAcct').value,amount,type:isIncome?'income':'expense',order:mo+1});
  }
  saveTxs(txs);closeCalPopup();render();
}
function deleteCalItem(){if(!calPopupId)return;saveTxs(loadTxs().filter(t=>t.id!==calPopupId));closeCalPopup();render();}

/* ── ACCT MANAGE ── */
function renderAcctManageList(){
  const accts=getAccts();
  document.getElementById('acctManageList').innerHTML=accts.map((a,i)=>`
    <div class="manage-item" draggable="true"
      ondragstart="acctDragStart(${i})"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="acctDrop(event,${i})" ondragend="acctDragEnd()">
      <span class="manage-dh">⠿</span>
      <div class="manage-icon" style="background:${iconBg(a.icon)}">${iconHtml(a.icon)}</div>
      <span class="manage-name">${a.name}</span>
      <div class="manage-btns">
        <button class="sm-btn" onclick="openAcctPopup('${a.id}')">편집</button>
        ${accts.length>1?`<button class="sm-btn danger" onclick="deleteAcct('${a.id}')">삭제</button>`:''}
      </div>
    </div>`).join('');
}
function acctDragStart(i){acctDragFrom=i;}
function acctDrop(e,toIdx){e.preventDefault();if(acctDragFrom===null||acctDragFrom===toIdx)return;const a=getAccts();const[m]=a.splice(acctDragFrom,1);a.splice(toIdx,0,m);saveAccts(a);acctDragFrom=null;renderAcctManageList();populateSelects();}
function acctDragEnd(){acctDragFrom=null;document.querySelectorAll('#acctManageList .manage-item').forEach(el=>el.classList.remove('drag-over'));}
function deleteAcct(id){const a=getAccts().filter(x=>x.id!==id);saveAccts(a);render();}

/* ── ACCT POPUP ── */
function openAcctPopup(id){
  acctPopupId=id;const accts=getAccts();const a=accts.find(x=>x.id===id)||{name:'',icon:{type:'emoji',val:'💳'}};
  document.getElementById('acctPopupTitle').textContent=id?'계좌/카드 편집':'계좌/카드 추가';
  document.getElementById('acctName').value=a.name;
  document.getElementById('acctDelBtn').style.display=(id&&accts.length>1)?'block':'none';
  document.getElementById('colorGrid').innerHTML=COLORS.map(c=>`<div class="color-swatch" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
  const ic=a.icon||{type:'emoji',val:'💳'};
  setIconType(ic.type||'emoji');
  if(ic.type==='emoji')document.getElementById('emojiVal').value=ic.val||'';
  if(ic.type==='color'){document.getElementById('colorLabel').value=ic.label||'';selectColor(ic.color||COLORS[0]);}
  if(ic.type==='base64')document.getElementById('base64Val').value=ic.val||'';
  updateIconPrev();
  document.getElementById('acctPopup').style.display='flex';
  setTimeout(()=>document.getElementById('acctName').focus(),50);
}
function closeAcctPopup(){document.getElementById('acctPopup').style.display='none';acctPopupId=null;}
function setIconType(t){
  curIconType=t;
  ['emoji','color','base64'].forEach(s=>{
    document.getElementById('ib'+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle('active',s===t);
    document.getElementById(s+'Panel').style.display=s===t?'block':'none';
  });
  updateIconPrev();
}
function selectColor(c){selColor=c;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('sel',s.style.backgroundColor===c||s.style.background===c));updateIconPrev();}
function updateIconPrev(){
  const p=document.getElementById('iconPrev');
  if(curIconType==='emoji'){p.textContent=document.getElementById('emojiVal').value||'💳';p.style.background='';}
  else if(curIconType==='color'){p.innerHTML=`<span style="font-size:16px;font-weight:700;color:#fff">${document.getElementById('colorLabel').value||'?'}</span>`;p.style.background=selColor;}
  else{const v=document.getElementById('base64Val').value.trim();p.innerHTML=v?`<img src="data:image/webp;base64,${v}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`:'🖼';p.style.background='';}
}
function saveAcctPopup(){
  const name=document.getElementById('acctName').value.trim();if(!name)return;
  let icon={};
  if(curIconType==='emoji')icon={type:'emoji',val:document.getElementById('emojiVal').value||'💳'};
  else if(curIconType==='color')icon={type:'color',color:selColor,label:document.getElementById('colorLabel').value||'?'};
  else icon={type:'base64',val:document.getElementById('base64Val').value.trim()};
  const accts=getAccts();
  if(acctPopupId){const i=accts.findIndex(a=>a.id===acctPopupId);if(i>=0){accts[i].name=name;accts[i].icon=icon;}}
  else accts.push({id:'a_'+Date.now(),name,icon});
  saveAccts(accts);closeAcctPopup();render();
}
function deleteAcctFromPopup(){deleteAcct(acctPopupId);closeAcctPopup();}

/* ── CAT MANAGE ── */
function renderCatManageList(){
  const cats=getCats();
  document.getElementById('catManageList').innerHTML=cats.map((c,i)=>`
    <div class="manage-item" draggable="true"
      ondragstart="catDragStart(${i})"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="catDrop(event,${i})" ondragend="catDragEnd()">
      <span class="manage-dh">⠿</span>
      <div class="manage-icon">${c.emoji||'📌'}</div>
      <span class="manage-name">${c.name}</span>
      <div class="manage-btns">
        <button class="sm-btn" onclick="openCatPopup('${c.id}')">편집</button>
        ${cats.length>1?`<button class="sm-btn danger" onclick="deleteCat('${c.id}')">삭제</button>`:''}
      </div>
    </div>`).join('');
}
function catDragStart(i){catDragFrom=i;}
function catDrop(e,toIdx){e.preventDefault();if(catDragFrom===null||catDragFrom===toIdx)return;const c=getCats();const[m]=c.splice(catDragFrom,1);c.splice(toIdx,0,m);saveCats(c);catDragFrom=null;renderCatManageList();populateSelects();}
function catDragEnd(){catDragFrom=null;document.querySelectorAll('#catManageList .manage-item').forEach(el=>el.classList.remove('drag-over'));}
function deleteCat(id){saveCats(getCats().filter(c=>c.id!==id));render();}
function openCatPopup(id){
  catPopupId=id;const cats=getCats();const c=cats.find(x=>x.id===id)||{name:'',emoji:''};
  document.getElementById('catPopupTitle').textContent=id?'카테고리 편집':'카테고리 추가';
  document.getElementById('catName').value=c.name;
  document.getElementById('catEmoji').value=c.emoji||'';
  document.getElementById('catPrev').textContent=c.emoji||'📌';
  document.getElementById('catDelBtn').style.display=(id&&cats.length>1)?'block':'none';
  document.getElementById('catPopup').style.display='flex';
  setTimeout(()=>document.getElementById('catName').focus(),50);
}
function closeCatPopup(){document.getElementById('catPopup').style.display='none';catPopupId=null;}
function saveCatPopup(){
  const name=document.getElementById('catName').value.trim();if(!name)return;
  const emoji=document.getElementById('catEmoji').value.trim();
  const cats=getCats();
  if(catPopupId){const i=cats.findIndex(c=>c.id===catPopupId);if(i>=0){cats[i].name=name;cats[i].emoji=emoji;}}
  else cats.push({id:'c_'+Date.now(),name,emoji});
  saveCats(cats);closeCatPopup();render();
}
function deleteCatFromPopup(){deleteCat(catPopupId);closeCatPopup();}

/* ── CSV ── */
function exportCSV(){
  const txs=sortedFiltered();if(!txs.length){alert('내역이 없습니다.');return;}
  const accts=getAccts();
  const blob=new Blob(['\uFEFF날짜,제목,내용,계좌,카테고리,금액,유형\n'+txs.map(t=>{
    const acct=accts.find(a=>a.id===t.acctId);
    return `${t.date},"${t.title||''}","${t.desc||''}","${acct?acct.name:''}",${t.cat},${t.amount},${t.type==='income'?'수입':'지출'}`;
  }).join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='가계부.csv';a.click();URL.revokeObjectURL(url);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&!e.shiftKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();}
  if(e.key==='Escape'){[closeCalPopup,closeAcctPopup,closeCatPopup,closeBookPopup].forEach(f=>f());editingCell={id:null,field:null};render();}
});

/* ── RENDER ── */
function render(){
  renderBookBar();populateSelects();renderAcctManageList();renderCatManageList();renderColToggles();
  applyRecurs();
  const txs=sortedFiltered();renderSummary(txs);
  if(curView==='list')renderList(txs);
  if(curView==='calendar')renderCalendar();
  if(curView==='recur')renderRecur();
}

window.addEventListener('load',()=>{migrate();initGSI();});
</script>
</body>
</html>
